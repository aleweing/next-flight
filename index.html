<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Next Flight" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Next Flight</title>

  <style>
    /* ─── TOKENS ─────────────────────────────────────────────── */
    :root {
      --bg:          #0a0f1e;
      --surface:     #111827;
      --surface2:    #1a2235;
      --border:      #1e2d45;
      --accent:      #3b82f6;
      --accent-glow: rgba(59,130,246,0.18);
      --accent2:     #06b6d4;
      --text:        #f0f4ff;
      --muted:       #6b7a99;
      --success:     #10b981;
      --warn:        #f59e0b;
      --danger:      #ef4444;
      --radius:      14px;
      --nav-h:       64px;
      --safe-b:      env(safe-area-inset-bottom, 0px);
    }

    /* ─── RESET ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input, select { font-family: inherit; }

    /* ─── LAYOUT ─────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* Header */
    header {
      padding: 16px 20px 12px;
      padding-top: calc(env(safe-area-inset-top, 0px) + 16px);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-title .logo {
      font-size: 22px;
    }
    .header-title h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .header-title span {
      color: var(--accent);
    }
    .route-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    /* Main scroll area */
    main {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Screen sections */
    .screen { display: none; padding: 20px 16px; }
    .screen.active { display: block; }

    /* Bottom nav */
    nav {
      height: calc(var(--nav-h) + var(--safe-b));
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-b);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: color 0.15s;
    }
    .nav-btn .icon { font-size: 22px; line-height: 1; }
    .nav-btn.active { color: var(--accent); }

    /* ─── COMPONENTS ─────────────────────────────────────────── */

    /* Section label */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      margin-top: 24px;
    }
    .section-label:first-child { margin-top: 0; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
    }

    /* Form controls */
    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    .field input,
    .field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 15px;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
    }
    .field input::placeholder { color: var(--muted); }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Chip group (airport selector) */
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.15s;
    }
    .chip.selected {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* CTA button */
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 15px;
      border-radius: var(--radius);
      letter-spacing: -0.2px;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-primary:active { opacity: 0.8; transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .toggle-row span {
      font-size: 14px;
      font-weight: 500;
    }
    .toggle {
      position: relative;
      width: 46px;
      height: 26px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 13px;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

    /* Flight result card */
    .flight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }
    .flight-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--accent);
      border-radius: 3px 0 0 3px;
    }
    .flight-card.good-price::before { background: var(--success); }

    .flight-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .airline-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .flight-price {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text);
    }
    .flight-price .currency {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      margin-right: 2px;
    }
    .price-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      margin-left: 8px;
    }
    .price-tag.ok { background: rgba(16,185,129,0.15); color: var(--success); }
    .price-tag.high { background: rgba(239,68,68,0.12); color: var(--danger); }

    .flight-route {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .iata {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .route-line {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .route-dots {
      width: 100%;
      height: 1px;
      background: var(--border);
      position: relative;
    }
    .route-dots::before,
    .route-dots::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
    }
    .route-dots::before { left: 0; }
    .route-dots::after { right: 0; }
    .route-stops {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
    }
    .route-stops.direct { color: var(--success); }

    .flight-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .meta-pill {
      background: var(--surface2);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .flight-footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .flight-date {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }
    .btn-book {
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 20px;
      text-decoration: none;
      letter-spacing: -0.2px;
      transition: opacity 0.15s;
    }
    .btn-book:active { opacity: 0.75; }

    /* State screens */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
      gap: 12px;
    }
    .state-icon { font-size: 48px; }
    .state-title { font-size: 17px; font-weight: 700; }
    .state-sub { font-size: 14px; color: var(--muted); line-height: 1.5; }

    /* Spinner */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Alert list (alertas screen) */
    .alert-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .alert-info { flex: 1; }
    .alert-route {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }
    .alert-detail {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .btn-delete {
      color: var(--danger);
      font-size: 18px;
      padding: 4px;
      opacity: 0.7;
      flex-shrink: 0;
    }
    .btn-search-alert {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-top: 8px;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-b) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    /* Segmented control */
    .segment-ctrl {
      display: flex;
      background: var(--surface2);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 18px;
      gap: 3px;
    }
    .segment-btn {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      transition: all 0.15s;
    }
    .segment-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="header-title">
      <span class="logo">✈️</span>
      <h1>Next <span>Flight</span></h1>
    </div>
    <div class="route-badge" id="routeBadge">ESP → ARG</div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- ── BUSCAR ── -->
    <section class="screen active" id="screen-buscar">

      <div class="section-label">Aeropuerto de salida</div>
      <div class="card">
        <div class="chip-group" id="chips-origin">
          <button class="chip selected" data-iata="MAD">MAD · Madrid</button>
          <button class="chip" data-iata="BCN">BCN · Barcelona</button>
          <button class="chip" data-iata="VLC">VLC · Valencia</button>
          <button class="chip" data-iata="AGP">AGP · Málaga</button>
        </div>
      </div>

      <div class="section-label">Aeropuerto de llegada</div>
      <div class="card">
        <div class="chip-group" id="chips-dest">
          <button class="chip selected" data-iata="EZE">EZE · Buenos Aires</button>
          <button class="chip" data-iata="AEP">AEP · Aeroparque</button>
          <button class="chip" data-iata="COR">COR · Córdoba</button>
          <button class="chip" data-iata="ROS">ROS · Rosario</button>
        </div>
      </div>

      <div class="section-label">Fechas y pasajeros</div>
      <div class="card">
        <div class="row-2">
          <div class="field">
            <label>SALIDA</label>
            <input type="date" id="dateFrom" />
          </div>
          <div class="field">
            <label>VUELTA (opcional)</label>
            <input type="date" id="dateTo" />
          </div>
        </div>
        <div class="row-2">
          <div class="field">
            <label>ADULTOS</label>
            <select id="adults">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>
          <div class="field">
            <label>CLASE</label>
            <select id="cabin">
              <option value="ECONOMY">Económica</option>
              <option value="PREMIUM_ECONOMY">Premium Eco</option>
              <option value="BUSINESS">Business</option>
              <option value="FIRST">Primera</option>
            </select>
          </div>
        </div>
      </div>

      <div class="section-label">Filtros</div>
      <div class="card">
        <div class="field">
          <label>PRECIO MÁXIMO (EUR)</label>
          <input type="number" id="maxPrice" placeholder="ej. 650" min="0" step="50" />
        </div>
        <div class="field">
          <label>AEROLÍNEA (opcional)</label>
          <select id="airline">
            <option value="">Todas las aerolíneas</option>
            <option value="IB">Iberia (IB)</option>
            <option value="UX">Air Europa (UX)</option>
            <option value="LA">LATAM (LA)</option>
            <option value="AR">Aerolíneas Argentinas (AR)</option>
            <option value="LX">Swiss (LX)</option>
            <option value="AF">Air France (AF)</option>
            <option value="KL">KLM (KL)</option>
            <option value="LH">Lufthansa (LH)</option>
          </select>
        </div>
        <div class="toggle-row">
          <span>Solo vuelos directos</span>
          <label class="toggle">
            <input type="checkbox" id="nonStop" />
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>
      </div>

      <button class="btn-primary" id="btnBuscar" onclick="buscarVuelos()">
        Buscar vuelos
      </button>
    </section>

    <!-- ── RESULTADOS ── -->
    <section class="screen" id="screen-resultados">
      <div id="resultsContainer">
        <div class="state-box">
          <div class="spinner"></div>
          <div class="state-sub">Consultando Amadeus…</div>
        </div>
      </div>
      <button class="btn-primary" style="margin-top:8px;" onclick="showScreen('buscar')">
        ← Nueva búsqueda
      </button>
    </section>

    <!-- ── ALERTAS ── -->
    <section class="screen" id="screen-alertas">
      <div class="segment-ctrl" id="alertTabs">
        <button class="segment-btn active" onclick="filterAlerts('all', this)">Todas</button>
        <button class="segment-btn" onclick="filterAlerts('hits', this)">Con precio</button>
      </div>
      <div id="alertsList"></div>
      <button class="btn-primary" onclick="showScreen('buscar')">
        + Crear alerta
      </button>
    </section>

  </main>

  <!-- BOTTOM NAV -->
  <nav>
    <button class="nav-btn active" id="nav-buscar" onclick="showScreen('buscar')">
      <span class="icon">🔍</span>
      Buscar
    </button>
    <button class="nav-btn" id="nav-resultados" onclick="showScreen('resultados')">
      <span class="icon">📋</span>
      Resultados
    </button>
    <button class="nav-btn" id="nav-alertas" onclick="showScreen('alertas'); renderAlerts()">
      <span class="icon">🔔</span>
      Alertas
    </button>
  </nav>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────
// ⚠️ Reemplaza con la URL de tu Cloudflare Worker
const WORKER_URL = 'https://nex-flight.alewein.workers.dev';

// ─── STATE ────────────────────────────────────────────────────────────
let selectedOrigin = 'MAD';
let selectedDest   = 'EZE';
let lastResults    = [];
let alerts         = JSON.parse(localStorage.getItem('nf_alerts') || '[]');

// ─── INIT ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Default date = mañana
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('dateFrom').value = tomorrow.toISOString().split('T')[0];

  // Chip listeners
  setupChips('chips-origin', (iata) => { selectedOrigin = iata; updateRouteBadge(); });
  setupChips('chips-dest',   (iata) => { selectedDest   = iata; updateRouteBadge(); });

  // Service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
});

function setupChips(groupId, onChange) {
  const group = document.getElementById(groupId);
  group.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      group.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      onChange(chip.dataset.iata);
    });
  });
}

function updateRouteBadge() {
  document.getElementById('routeBadge').textContent = `${selectedOrigin} → ${selectedDest}`;
}

// ─── NAVIGATION ───────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
}

// ─── SEARCH ───────────────────────────────────────────────────────────
async function buscarVuelos() {
  const dateFrom = document.getElementById('dateFrom').value;
  if (!dateFrom) { toast('Elige una fecha de salida', 'error'); return; }

  const params = {
    origin:      selectedOrigin,
    destination: selectedDest,
    dateFrom,
    dateTo:      document.getElementById('dateTo').value || null,
    adults:      document.getElementById('adults').value,
    cabin:       document.getElementById('cabin').value,
    maxPrice:    document.getElementById('maxPrice').value || null,
    airline:     document.getElementById('airline').value || null,
    nonStop:     document.getElementById('nonStop').checked,
  };

  showScreen('resultados');
  document.getElementById('resultsContainer').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-sub">Buscando vuelos ${params.origin} → ${params.destination}…</div>
    </div>`;

  // ¿Guardar como alerta?
  if (params.maxPrice) saveAlert(params);

  try {
    const url = new URL(`${WORKER_URL}/search`);
    Object.entries(params).forEach(([k, v]) => { if (v !== null && v !== false) url.searchParams.set(k, v); });

    const res  = await fetch(url);
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Error de API');

    lastResults = data.offers || [];
    renderResults(lastResults, params.maxPrice);
  } catch (err) {
    document.getElementById('resultsContainer').innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        <div class="state-title">No se pudo conectar</div>
        <div class="state-sub">${err.message}</div>
      </div>`;
  }
}

function renderResults(offers, maxPrice) {
  if (!offers.length) {
    document.getElementById('resultsContainer').innerHTML = `
      <div class="state-box">
        <div class="state-icon">🔭</div>
        <div class="state-title">Sin resultados</div>
        <div class="state-sub">Prueba otras fechas, amplía el presupuesto o cambia el filtro de aerolínea.</div>
      </div>`;
    return;
  }

  const html = offers.map(offer => flightCard(offer, maxPrice)).join('');
  document.getElementById('resultsContainer').innerHTML = html;
}

function flightCard(offer, maxPrice) {
  const price     = parseFloat(offer.price.total);
  const currency  = offer.price.currency;
  const underBudget = maxPrice && price <= parseFloat(maxPrice);

  // Parsear itinerario de ida
  const itinerary = offer.itineraries[0];
  const segments  = itinerary.segments;
  const first     = segments[0];
  const last      = segments[segments.length - 1];
  const origin    = first.departure.iataCode;
  const dest      = last.arrival.iataCode;
  const depDate   = new Date(first.departure.at);
  const arrDate   = new Date(last.arrival.at);
  const airline   = first.carrierCode;
  const stops     = segments.length - 1;
  const duration  = formatDuration(itinerary.duration);

  const stopLabel = stops === 0
    ? '<span class="route-stops direct">Directo</span>'
    : `<span class="route-stops">${stops} escala${stops > 1 ? 's' : ''}</span>`;

  const stopPills = stops > 0
    ? segments.slice(0, -1).map(s =>
        `<div class="meta-pill">🔁 ${s.arrival.iataCode}</div>`
      ).join('')
    : '';

  const bookUrl = buildBookUrl(offer);

  return `
    <div class="flight-card ${underBudget ? 'good-price' : ''}">
      <div class="flight-header">
        <div>
          <div class="airline-name">${getAirlineName(airline)}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">${airline} · ${first.number || ''}</div>
        </div>
        <div style="text-align:right">
          <div class="flight-price">
            <span class="currency">${currency}</span>${Math.round(price)}
            ${underBudget ? '<span class="price-tag ok">✓ Ok</span>' : (maxPrice ? '<span class="price-tag high">Sobre presupuesto</span>' : '')}
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">por persona</div>
        </div>
      </div>

      <div class="flight-route">
        <div>
          <div class="iata">${origin}</div>
          <div style="font-size:11px;color:var(--muted)">${fmt(depDate, 'HH:MM')}</div>
        </div>
        <div class="route-line">
          <div class="route-dots"></div>
          ${stopLabel}
          <div style="font-size:10px;color:var(--muted)">${duration}</div>
        </div>
        <div style="text-align:right">
          <div class="iata">${dest}</div>
          <div style="font-size:11px;color:var(--muted)">${fmt(arrDate, 'HH:MM')}</div>
        </div>
      </div>

      <div class="flight-meta">
        ${stopPills}
        <div class="meta-pill">🪑 ${cabinLabel(offer)}</div>
        ${offer.itineraries[1] ? `<div class="meta-pill">↩️ Ida y vuelta</div>` : '<div class="meta-pill">➡️ Solo ida</div>'}
      </div>

      <div class="flight-footer">
        <div class="flight-date">${fmt(depDate, 'DD MMM YYYY')}</div>
        <a href="${bookUrl}" target="_blank" rel="noopener" class="btn-book">Comprar →</a>
      </div>
    </div>`;
}

// ─── ALERTS ───────────────────────────────────────────────────────────
function saveAlert(params) {
  const exists = alerts.some(a =>
    a.origin === params.origin &&
    a.destination === params.destination &&
    a.maxPrice === params.maxPrice
  );
  if (exists) return;

  alerts.push({ ...params, id: Date.now(), lastCheck: null, lastPrice: null });
  localStorage.setItem('nf_alerts', JSON.stringify(alerts));
  toast('Alerta guardada 🔔', 'success');
}

function renderAlerts(filter = 'all') {
  const list = document.getElementById('alertsList');
  if (!alerts.length) {
    list.innerHTML = `
      <div class="state-box">
        <div class="state-icon">🔔</div>
        <div class="state-title">Sin alertas</div>
        <div class="state-sub">Busca un vuelo con precio máximo y se guardará aquí automáticamente.</div>
      </div>`;
    return;
  }

  const filtered = filter === 'hits'
    ? alerts.filter(a => a.lastPrice && a.lastPrice <= parseFloat(a.maxPrice))
    : alerts;

  list.innerHTML = filtered.map(a => `
    <div class="alert-card" id="alert-${a.id}">
      <div class="alert-info">
        <div class="alert-route">${a.origin} → ${a.destination}</div>
        <div class="alert-detail">
          Salida: ${a.dateFrom}${a.dateTo ? ` · Vuelta: ${a.dateTo}` : ''}<br>
          Presupuesto: hasta ${a.maxPrice} EUR
          ${a.nonStop ? ' · Solo directo' : ''}
          ${a.airline ? ` · ${getAirlineName(a.airline)}` : ''}
          ${a.lastCheck ? `<br><span style="color:var(--muted)">Última comprobación: ${new Date(a.lastCheck).toLocaleString('es-ES')}</span>` : ''}
          ${a.lastPrice ? `<br><span style="color:${a.lastPrice <= parseFloat(a.maxPrice) ? 'var(--success)' : 'var(--danger)'}">Último precio encontrado: ${Math.round(a.lastPrice)} EUR</span>` : ''}
        </div>
        <button class="btn-search-alert" onclick="checkAlert(${a.id})">
          Comprobar ahora
        </button>
      </div>
      <button class="btn-delete" onclick="deleteAlert(${a.id})">✕</button>
    </div>`).join('');
}

function filterAlerts(type, btn) {
  document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAlerts(type);
}

function deleteAlert(id) {
  alerts = alerts.filter(a => a.id !== id);
  localStorage.setItem('nf_alerts', JSON.stringify(alerts));
  renderAlerts();
}

async function checkAlert(id) {
  const alert = alerts.find(a => a.id === id);
  if (!alert) return;

  toast('Comprobando…');
  try {
    const url = new URL(`${WORKER_URL}/search`);
    const params = { ...alert };
    Object.entries(params).forEach(([k, v]) => {
      if (v !== null && v !== false && v !== undefined && !['id','lastCheck','lastPrice'].includes(k))
        url.searchParams.set(k, v);
    });

    const res  = await fetch(url);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error');

    const offers = data.offers || [];
    alert.lastCheck = Date.now();
    alert.lastPrice = offers.length ? parseFloat(offers[0].price.total) : null;

    localStorage.setItem('nf_alerts', JSON.stringify(alerts));

    if (alert.lastPrice && alert.lastPrice <= parseFloat(alert.maxPrice)) {
      toast(`✅ ¡Precio encontrado! ${Math.round(alert.lastPrice)} EUR`, 'success');
      lastResults = offers;
      renderAlerts();
      setTimeout(() => showScreen('resultados'), 1500);
      renderResults(offers, alert.maxPrice);
    } else if (alert.lastPrice) {
      toast(`Mínimo hoy: ${Math.round(alert.lastPrice)} EUR (sobre presupuesto)`, 'error');
      renderAlerts();
    } else {
      toast('Sin resultados para esta ruta/fecha', 'error');
      renderAlerts();
    }
  } catch (err) {
    toast(`Error: ${err.message}`, 'error');
  }
}

// ─── HELPERS ──────────────────────────────────────────────────────────
function formatDuration(iso) {
  const match = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
  if (!match) return iso;
  const h = match[1] ? `${match[1]}h` : '';
  const m = match[2] ? `${match[2]}m` : '';
  return `${h} ${m}`.trim();
}

function fmt(date, format) {
  const pad = n => String(n).padStart(2, '0');
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return format
    .replace('HH', pad(date.getHours()))
    .replace('MM', pad(date.getMinutes()))
    .replace('DD', pad(date.getDate()))
    .replace('MMM', months[date.getMonth()])
    .replace('YYYY', date.getFullYear());
}

function cabinLabel(offer) {
  try {
    const cabin = offer.travelerPricings[0].fareDetailsBySegment[0].cabin;
    const map = { ECONOMY:'Turista', PREMIUM_ECONOMY:'Premium Eco', BUSINESS:'Business', FIRST:'Primera' };
    return map[cabin] || cabin;
  } catch { return ''; }
}

function getAirlineName(code) {
  const map = {
    IB:'Iberia', UX:'Air Europa', LA:'LATAM', AR:'Aerolíneas Arg.',
    LX:'Swiss', AF:'Air France', KL:'KLM', LH:'Lufthansa',
    IB2:'Iberia Express', VY:'Vueling', AZ:'ITA Airways', OS:'Austrian'
  };
  return map[code] || code;
}

function buildBookUrl(offer) {
  // Kiwi devuelve deepLink directo → úsalo si existe
  if (offer.deepLink) return offer.deepLink;
  try {
    const seg    = offer.itineraries[0].segments[0];
    const origin = seg.departure.iataCode;
    const dest   = offer.itineraries[0].segments[offer.itineraries[0].segments.length-1].arrival.iataCode;
    const date   = seg.departure.at.split('T')[0].replace(/-/g,'');
    return `https://www.google.com/flights?hl=es#flt=${origin}.${dest}.${date};c:EUR;e:1;s:0*1;sd:1;t:f`;
  } catch {
    return 'https://www.google.com/flights';
  }
}

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
